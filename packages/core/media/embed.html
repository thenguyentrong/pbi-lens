<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #container { width: 100%; height: 100%; }
    #container iframe { border: 0; }
  </style>
  <script src="./powerbi.min.js"></script>
  <script src="./powerbi-report-authoring.min.js"></script>
</head>
<body>
  <div id="container"></div>
  <script>
    // Control surface used by the Playwright driver (page.evaluate) and the
    // VS Code webview (postMessage). All state changes go through __pbi so
    // callers can await a fresh `rendered` event before screenshotting.
    (function () {
      var models = window["powerbi-client"].models;
      var report = null;
      var renderSeq = 0;

      window.__state = { rendered: false, error: null, renderSeq: 0 };

      function armRenderWait() {
        window.__state.rendered = false;
        renderSeq++;
      }

      function attachEvents(r) {
        r.off("rendered");
        r.on("rendered", function () {
          window.__state.rendered = true;
          window.__state.renderSeq = renderSeq;
        });
        r.off("error");
        r.on("error", function (e) {
          window.__state.error = JSON.stringify(e && e.detail ? e.detail : e);
        });
      }

      window.__pbi = {
        init: function (config) {
          armRenderWait();
          var embedConfig = {
            type: "report",
            id: config.reportId,
            embedUrl: config.embedUrl,
            accessToken: config.accessToken,
            tokenType: models.TokenType.Aad,
            // Permissions.All + a viewMode switch lets the report-authoring
            // APIs (field bindings) work without re-embedding.
            permissions: models.Permissions.All,
            viewMode: config.mode === "edit" ? models.ViewMode.Edit : models.ViewMode.View,
            settings: {
              panes: {
                filters: { visible: false },
                pageNavigation: { visible: config.showNav !== false },
                visualizations: { visible: false },
                fields: { visible: false },
              },
              background: models.BackgroundType.Default,
            },
          };
          if (config.pageName) embedConfig.pageName = config.pageName;
          var container = document.getElementById("container");
          window.powerbi.reset(container);
          report = window.powerbi.embed(container, embedConfig);
          attachEvents(report);
          return true;
        },

        setAccessToken: function (token) {
          return report.setAccessToken(token);
        },

        getPages: function () {
          return report.getPages().then(function (pages) {
            return pages.map(function (p) {
              return {
                name: p.name,
                displayName: p.displayName,
                isActive: p.isActive,
                defaultSize: p.defaultSize,
              };
            });
          });
        },

        setPage: function (pageName) {
          armRenderWait();
          return report.setPage(pageName);
        },

        getVisuals: function () {
          return report.getActivePage().then(function (page) {
            return page.getVisuals().then(function (visuals) {
              return visuals.map(function (v) {
                return { name: v.name, title: v.title, type: v.type, layout: v.layout };
              });
            });
          });
        },

        // filters: array of powerbi filter objects (IBasicFilter/IAdvancedFilter...)
        setFilters: function (filters) {
          armRenderWait();
          return report.updateFilters(models.FiltersOperations.ReplaceAll, filters);
        },

        clearFilters: function () {
          armRenderWait();
          return report.updateFilters(models.FiltersOperations.RemoveAll);
        },

        // slicer state on a visual of the active page; state = { filters: [...] }
        setSlicer: function (visualName, state) {
          return report.getActivePage().then(function (page) {
            return page.getVisuals().then(function (visuals) {
              var target = visuals.find(function (v) { return v.name === visualName; });
              if (!target) throw new Error("Slicer visual not found: " + visualName);
              armRenderWait();
              return target.setSlicerState(state);
            });
          });
        },

        // Geometry needed to crop a single visual out of the page screenshot.
        getActivePageSize: function () {
          return report.getActivePage().then(function (page) {
            return page.defaultSize;
          });
        },

        // View <-> Edit. Field-binding readback (report authoring APIs) may
        // require edit mode; screenshots must be taken in view mode.
        switchMode: function (mode) {
          armRenderWait();
          return Promise.resolve(report.switchMode(mode)).then(function () { return true; });
        },

        // Which column/measure sits in which data role (axis/legend/values)
        // of one visual. Needs powerbi-report-authoring.min.js loaded.
        getVisualFields: function (visualName) {
          return report.getActivePage().then(function (page) {
            return page.getVisuals().then(function (visuals) {
              var v = visuals.find(function (x) { return x.name === visualName; });
              if (!v) throw new Error("Visual not found: " + visualName);
              if (typeof v.getDataFields !== "function" || typeof v.getCapabilities !== "function") {
                throw new Error("powerbi-report-authoring bundle not loaded — field readback unavailable");
              }
              return v.getCapabilities().then(function (caps) {
                var roles = (caps && caps.dataRoles) || [];
                return Promise.all(
                  roles.map(function (role) {
                    return v.getDataFields(role.name).then(
                      function (fields) {
                        // Sparse SDK results serialize undefined -> null; drop them.
                        var clean = (fields || []).filter(function (f) { return f != null; });
                        return { role: role.name, displayName: role.displayName, fields: clean };
                      },
                      function () {
                        return { role: role.name, displayName: role.displayName, fields: [] };
                      }
                    );
                  })
                ).then(function (out) {
                  return { name: v.name, title: v.title, type: v.type, roles: out };
                });
              });
            });
          });
        },

        // Summarized/underlying data of one visual as CSV (SDK exportData).
        exportVisualData: function (visualName, exportType, rows) {
          return report.getActivePage().then(function (page) {
            return page.getVisuals().then(function (visuals) {
              var v = visuals.find(function (x) { return x.name === visualName; });
              if (!v) throw new Error("Visual not found: " + visualName);
              var type = exportType === "underlying"
                ? models.ExportDataType.Underlying
                : models.ExportDataType.Summarized;
              return v.exportData(type, rows).then(function (result) {
                return { data: result && result.data };
              });
            });
          });
        },

        // Active filter state: report level, page level, and per visual
        // (slicer state included for slicers). Per-visual errors -> null.
        getFilters: function () {
          return report.getActivePage().then(function (page) {
            return Promise.all([
              report.getFilters().catch(function () { return []; }),
              page.getFilters().catch(function () { return []; }),
              page.getVisuals().then(function (visuals) {
                return Promise.all(
                  visuals.map(function (v) {
                    var filters = v.getFilters().catch(function () { return null; });
                    var slicer = v.type === "slicer"
                      ? v.getSlicerState().catch(function () { return undefined; })
                      : Promise.resolve(undefined);
                    return Promise.all([filters, slicer]).then(function (r) {
                      var entry = { name: v.name, title: v.title, type: v.type, filters: r[0] };
                      if (r[1] !== undefined) entry.slicerState = r[1];
                      return entry;
                    });
                  })
                );
              }),
            ]).then(function (r) {
              return { report: r[0], page: r[1], visuals: r[2] };
            });
          });
        },
      };

      // VS Code webview integration (no-op under Playwright).
      if (typeof acquireVsCodeApi === "function") {
        var vscode = acquireVsCodeApi();
        window.addEventListener("message", function (event) {
          var msg = event.data || {};
          if (msg.type === "init") {
            window.__pbi.init(msg.config);
          } else if (msg.type === "setPage") {
            window.__pbi.setPage(msg.pageName);
          } else if (msg.type === "setAccessToken") {
            window.__pbi.setAccessToken(msg.accessToken);
          } else if (msg.type === "getPages") {
            window.__pbi.getPages().then(function (pages) {
              vscode.postMessage({ type: "pages", pages: pages });
            });
          }
        });
        vscode.postMessage({ type: "ready" });
      }
    })();
  </script>
</body>
</html>
